server:
  port: 8087

spring:
  application:
    name: oa-data-visual-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:192.168.150.102}:${MYSQL_PORT:3306}/statistics_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:192.168.150.102}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:192.168.150.102:8848}
        namespace: public
      config:
        server-addr: ${NACOS_SERVER_ADDR:192.168.150.102:8848}
        namespace: public
        file-extension: yaml
        import-check:
          enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

xxl:
  job:
    enabled: ${XXL_JOB_ENABLED:false}
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://127.0.0.1:8080/xxl-job-admin}
    access-token: ${XXL_JOB_ACCESS_TOKEN:}
    executor:
      appname: ${XXL_JOB_EXECUTOR_APPNAME:oa-data-visual-service}
      address: ${XXL_JOB_EXECUTOR_ADDRESS:}
      ip: ${XXL_JOB_EXECUTOR_IP:}
      port: ${XXL_JOB_EXECUTOR_PORT:9997}
      log-path: ${XXL_JOB_LOG_PATH:./logs/xxl-job/jobhandler}
      log-retention-days: ${XXL_JOB_LOG_RETENTION_DAYS:30}

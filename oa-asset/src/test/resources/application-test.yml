spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:asset_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
  cloud:
    discovery:
      enabled: false
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

name: oa_app
description: "OA Management Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  http: ^1.2.2

  # Local storage
  shared_preferences: ^2.3.4

  # Utilities
  intl: ^0.19.0

  # Location
  geolocator: ^13.0.2
  geolocator_android: ^4.1.0
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

server:
  port: 9101

spring:
  application:
    name: user-service
  profiles:
    active: dev
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      server-addr: 192.168.150.102:8848
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        group: OA_GROUP
      config:
        group: OA_GROUP
        file-extension: yaml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://192.168.150.102:8848:${MYSQL_PORT:3306}/user_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: 192.168.150.102:8848
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

knife4j:
  enable: true

oa:
  security:
    jwt:
      secret: ${JWT_SECRET:oa-system-ai-default-jwt-secret-key-change-me-32bytes}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
      issuer: oa-system-ai
